<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology Tech Club - LIVE LEADERBOARD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: #ffffff; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        h1 { font-size: 42px; color: #f43f5e; text-shadow: 0 0 20px rgba(244, 63, 94, 0.6); margin-bottom: 5px; letter-spacing: 2px; font-weight: 800; }
        .subtitle { font-size: 18px; color: #38bdf8; margin-bottom: 40px; font-weight: bold; }
        .board { width: 100%; max-width: 850px; background: rgba(30, 41, 59, 0.4); border: 2px solid #334155; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden; padding: 15px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; margin: 8px 0; border-radius: 12px; background: #1e293b; font-size: 22px; font-weight: 600; }
        .row.top1 { background: linear-gradient(90deg, #b45309, #f59e0b); color: #0f172a; transform: scale(1.01); box-shadow: 0 0 25px rgba(245, 158, 11, 0.4); }
        .row.top2 { background: linear-gradient(90deg, #475569, #94a3b8); color: #0f172a; }
        .row.top3 { background: linear-gradient(90deg, #7c2d12, #ea580c); color: #ffffff; }
        .rank { width: 65px; font-size: 26px; font-weight: 900; }
        .info { flex-grow: 1; display: flex; align-items: center; gap: 20px; }
        .class-tag { color: #38bdf8; font-size: 16px; background: rgba(56, 189, 248, 0.15); padding: 4px 12px; border-radius: 6px; font-weight: 700; }
        .row.top1 .class-tag, .row.top2 .class-tag { color: #0f172a; background: rgba(0,0,0,0.08); }
        .score { font-size: 26px; font-weight: 800; color: #34d399; }
        .row.top1 .score, .row.top2 .score { color: #0f172a; }
    </style>
</head>
<body>

    <h1>🏆 REAL-TIME LEADERBOARD 🏆</h1>
    <div class="subtitle">MIXOLOGY TECH CLUB FESTIVAL</div>

    <div class="board" id="board-container">
        <div style="text-align: center; padding: 50px; color: #64748b; font-size: 18px;">⏳ Đang đồng bộ hóa hệ thống dữ liệu...</div>
    </div>

    <script>
        function listenToScores() {
            setInterval(() => {
                fetch('https://api.jsonbin.io/v3/b/663806e2ad19ca34f8646b9a/latest', {
                    method: 'GET',
                    headers: { 'X-Master-Key': '$2a$10$Wp6p7gXQ6e2gS9Sbe5D6e.9AQL/s6eUv8U2iWbE7qf9zP6Z5Z5Z5Z' }
                })
                .then(res => res.json())
                .then(resData => {
                    let data = resData.record;
                    if (!data || Object.keys(data).length === 0) {
                        document.getElementById('board-container').innerHTML = `<div style="text-align: center; padding: 50px; color: #64748b;">⏳ Chưa có thí sinh nào nộp bài.</div>`;
                        return;
                    }
                    
                    let scoreArray = Object.keys(data)
                        .map(key => data[key])
                        .filter(user => user && user.name && user.id);

                    if (scoreArray.length === 0) return;

                    scoreArray.sort((a, b) => b.score - a.score || a.time - b.time);
                    renderLeaderboard(scoreArray.slice(0, 10));
                })
                .catch(err => console.log("Đang chờ mạng..."));
            }, 3000); // Quét liên tục mỗi 3 giây
        }

        function renderLeaderboard(topList) {
            const container = document.getElementById('board-container');
            container.innerHTML = "";

            topList.forEach((user, index) => {
                const row = document.createElement('div');
                let rankClass = "";
                if (index === 0) rankClass = "top1";
                else if (index === 1) rankClass = "top2";
                else if (index === 2) rankClass = "top3";

                row.className = `row ${rankClass}`;
                row.innerHTML = `
                    <div class="rank">#${index + 1}</div>
                    <div class="info">
                        <span class="class-tag">${user.class || '일반'}</span>
                        <span>${user.name} (${user.id})</span>
                    </div>
                    <div class="score">${user.score}점</div>
                `;
                container.appendChild(row);
            });
        }

        listenToScores();
    </script>
</body>
</html>
