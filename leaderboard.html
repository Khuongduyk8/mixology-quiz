<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology Tech Club - LIVE LEADERBOARD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020617; color: #ffffff; margin: 0; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        h1 { font-size: 42px; color: #f43f5e; text-shadow: 0 0 20px rgba(244, 63, 94, 0.6); margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { font-size: 18px; color: #38bdf8; margin-bottom: 40px; font-weight: bold; }
        .board { width: 100%; max-width: 800px; background: rgba(30, 41, 59, 0.5); border: 2px solid #334155; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow: hidden; padding: 10px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 18px 25px; margin: 8px; border-radius: 12px; background: #1e293b; font-size: 20px; font-weight: 600; transition: all 0.5s ease; }
        .row.top1 { background: linear-gradient(90deg, #b45309, #f59e0b); color: #0f172a; transform: scale(1.02); box-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .row.top2 { background: linear-gradient(90deg, #475569, #94a3b8); color: #0f172a; }
        .row.top3 { background: linear-gradient(90deg, #7c2d12, #ea580c); }
        .rank { width: 60px; font-size: 24px; font-weight: 800; }
        .info { flex-grow: 1; display: flex; gap: 20px; }
        .class-tag { color: #38bdf8; font-size: 16px; background: rgba(56, 189, 248, 0.1); padding: 3px 10px; border-radius: 6px; }
        .row.top1 .class-tag, .row.top2 .class-tag { color: #0f172a; background: rgba(0,0,0,0.1); }
        .score { font-size: 24px; font-weight: 800; color: #38bdf8; }
        .row.top1 .score, .row.top2 .score { color: #0f172a; }
    </style>
</head>
<body>

    <h1>🏆 REAL-TIME LEADERBOARD 🏆</h1>
    <div class="subtitle">MIXOLOGY TECH CLUB FESTIVAL</div>

    <div class="board" id="board-container">
        <div style="text-align: center; padding: 40px; color: #64748b;">대기 중... 실시간으로 점수가 업데이트됩니다.</div>
    </div>

    <script>
        // Hàm liên tục cập nhật dữ liệu tự động từ Cloud về TV công khai
        function listenToScores() {
            setInterval(() => {
                fetch('https://mixology-tech-default-rtdb.firebaseio.com/scores.json')
                .then(res => res.json())
                .then(data => {
                    if (!data) return;
                    // Chuyển Object thành Array để sắp xếp
                    let scoreArray = Object.keys(data).map(key => data[key]);
                    // Sắp xếp: Điểm cao xếp trước, nếu bằng điểm thì ai nộp trước (thời gian nhỏ hơn) xếp trước
                    scoreArray.sort((a, b) => b.score - a.score || a.time - b.time);
                    
                    renderLeaderboard(scoreArray.slice(0, 10)); // Chỉ lấy Top 10 người xuất sắc nhất
                });
            }, 2000); // Tự động làm mới dữ liệu mỗi 2 giây siêu tốc
        }

        function renderLeaderboard(topList) {
            const container = document.getElementById('board-container');
            container.innerHTML = "";

            topList.forEach((user, index) => {
                const row = document.createElement('div');
                let rankClass = "";
                if (index === 0) rankClass = "top1";
                else if (index === 1) rankClass = "top2";
                else if (index === 2) rankClass = "top3";

                row.className = `row ${rankClass}`;
                row.innerHTML = `
                    <div class="rank">#${index + 1}</div>
                    <div class="info">
                        <span class="class-tag">${user.class}</span>
                        <span>${user.name} (${user.id})</span>
                    </div>
                    <div class="score">${user.score}점</div>
                `;
                container.appendChild(row);
            });
        }

        listenToScores();
    </script>
</body>
</html>
