<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixology Tech Club - Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); text-align: center; }
        h1 { font-size: 24px; margin-bottom: 25px; color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 14px; margin-bottom: 8px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #ffffff; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.3); }
        .country-title { font-size: 14px; color: #94a3b8; text-align: left; margin-top: 25px; margin-bottom: 10px; }
        .country-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 25px; }
        .country-btn { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #ffffff; font-size: 14px; cursor: pointer; font-weight: 600; }
        .country-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }
        .country-btn.full-width { grid-column: span 2; background: linear-gradient(90deg, #312e81, #1e1b4b); }
        .start-btn { width: 100%; padding: 14px; border-radius: 8px; border: none; background: linear-gradient(90deg, #0ea5e9, #2563eb); color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        #quiz-screen, #result-screen { display: none; }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; text-align: left; line-height: 1.5; }
        .answer-options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 14px; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; text-align: left; cursor: pointer; font-size: 15px; }
        .option-btn:hover { border-color: #38bdf8; }
        .progress { font-size: 14px; color: #94a3b8; margin-bottom: 10px; text-align: right; }
        .score-text { font-size: 28px; color: #38bdf8; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container" id="login-screen">
        <h1>🍹 MIXOLOGY QUIZ 🍹</h1>
        <div class="input-group">
            <label>이름 (Name):</label>
            <input type="text" id="studentName" placeholder="예: 이현수">
        </div>
        <div class="input-group">
            <label>학번 (ID 5~6자리):</label>
            <input type="number" id="studentId" placeholder="학년+반+번호 (5~6자리)">
        </div>
        <div class="country-title">언어 선택 (Select Country):</div>
        <div class="country-grid">
            <button class="country-btn" onclick="selectCountry('베트남', this)">🇻🇳 베트남어</button>
            <button class="country-btn" onclick="selectCountry('러시아', this)">🇷🇺 러시아어</button>
            <button class="country-btn" onclick="selectCountry('필리핀', this)">🇵🇭 영어</button>
            <button class="country-btn" onclick="selectCountry('중국', this)">🇨🇳 중국어</button>
            <button class="country-btn full-width" onclick="selectCountry('대한민국', this)">🇰🇷 한국어</button>
        </div>
        <button class="start-btn" onclick="startQuiz()">퀴즈 시작하기</button>
    </div>

    <div class="container" id="quiz-screen">
        <h1 id="quiz-title">🌍 QUIZ</h1>
        <div class="progress" id="quiz-progress">1 / 5</div>
        <div class="question-text" id="question-text">Loading...</div>
        <div class="answer-options" id="options-container"></div>
    </div>

    <div class="container" id="result-screen">
        <h1>🎉 SUBMITTED! 🎉</h1>
        <div class="score-text" id="score-text">0 / 100</div>
        <p style="color: #34d399; font-weight: bold; font-size: 14px; margin-top: 20px;">✓ 점수가 TV 화면에 실시간으로 표시됩니다!</p>
    </div>

    <script>
        const quizDatabase = {
            '베트남': [
                { q: "Trang phục truyền thống của Việt Nam được làm bằng lụa, có tà áo dài xẻ hai bên mặc cùng với quần là gì?", o: ["Sườn xám", "Áo dài", "Hanbok", "Kimono"], a: 1 },
                { q: "Tên loại cà phê đậm đặc của Việt Nam pha với sữa đặc có đường và đá là gì?", o: ["Cà phê sữa đá", "Americano", "Cafe Latte", "Espresso"], a: 0 },
                { q: "Thành phố có lịch sử ngàn năm văn hiến và hiện là thủ đô của Việt Nam tên là gì?", o: ["Hồ Chí Minh", "Đà Nẵng", "Hà Nội", "Nha Trang"], a: 2 },
                { q: "Món ăn truyền thống nổi tiếng thế giới của Việt Nam có bánh phở, nước dùng bò hoặc gà là gì?", o: ["Mì Ramen", "Pad Thai", "Phở", "Mì Ý"], a: 2 },
                { q: "Di sản thiên nhiên thế giới nổi tiếng của Việt Nam với hơn 3.000 hòn đảo đá vôi nhô lên trên biển là gì?", o: ["Hạ Long", "Sapa", "Mũi Né", "Phú Quốc"], a: 0 }
            ],
            '러시아': [
                { q: "Как называется традиционный русский суп на основе свеклы, который обычно подают со сметаной?", o: ["Щи", "Борщ", "Солянка", "Окрошка"], a: 1 },
                { q: "Какая всемирно известная традиционная русская деревянная игрушка состоит из вложенных друг в друга кукол?", o: ["Чебурашка", "Матрёшка", "Неваляшка", "Дымковская игрушка"], a: 1 },
                { q: "Какое глубокое и знаменитое озеро в Сибири является самым глубоким пресноводным озером в мире?", o: ["Ладожское озеро", "Каспийское море", "Озеро Байкал", "Онежское озеро"], a: 2 },
                { q: "Как называется традиционный русский чайный прибор, используемый для кипячения воды?", o: ["Самовар", "Чайник", "Кофейник", "Турка"], a: 0 },
                { q: "Какая площадь в Москве является сердцем России, где находятся Кремль и Храм Василия Блаженного?", o: ["Дворцовая площадь", "Сенатская площадь", "Красная площадь", "Манежная площадь"], a: 2 }
            ],
            '필리핀': [
                { q: "What is the capital city of the Philippines, known as the center of economic and cultural activities?", o: ["Cebu", "Manila", "Davao", "Boracay"], a: 1 },
                { q: "Which famous Filipino dish features meat (often chicken or pork) marinated in vinegar, soy sauce, garlic, and peppercorns?", o: ["Sinigang", "Lechon", "Adobo", "Kare-Kare"], a: 2 },
                { q: "What is the traditional national costume for Filipino men, often made of pineapple fiber and worn untucked?", o: ["Barong Tagalog", "Baro't Saya", "Malong", "Bahag"], a: 0 },
                { q: "Which Philippine island resort is world-famous for its powdery white sand beaches and vibrant nightlife?", o: ["Palawan", "Siargao", "Boracay", "Bohol"], a: 2 },
                { q: "What unique and colorful public transport vehicle is considered an iconic cultural symbol of the Philippines?", o: ["Tuk-tuk", "Jeepney", "Kalesa", "Trishaw"], a: 1 }
            ],
            '중국': [
                { q: "中国的法定首都，同时也是拥有故宫、天安门等历史名胜的国际大都市是哪座城市？", o: ["上海", "广州", "北京", "西安"], a: 2 },
                { q: "被誉为中国“国宝”，主要以竹子为主食，拥有黑白相间毛色的珍稀动物是什么？", o: ["华南虎", "金丝猴", "大熊猫", "丹顶鹤"], a: 2 },
                { q: "中国最著名的传统手工艺品之一，常用于制作精美茶具和花瓶，英文名称与中国相同的器物是什么？", o: ["丝绸", "瓷器", "景泰蓝", "漆器"], a: 1 },
                { q: "为了防御古代外族入侵而修建，横跨中国北方的宏伟古代军事防御工程是什么？", o: ["万里长城", "秦始皇兵马俑", "大运河", "都江堰"], a: 0 },
                { q: "中国普及度极高、常在聚会时全家围坐在一起吃、将食材放入沸腾汤底中烫熟 flee 饮食形式是什么？", o: ["北京烤鸭", "锅贴", "火锅", "小笼包"], a: 2 }
            ],
            '대한민국': [
                { q: "한국의 대표적인 전통 발효 식품으로 영양이 풍부하며 매콤한 맛이 특징인 것은?", o: ["치즈", "김치", "단무지", "피클"], a: 1 },
                { q: "조선시대 세종대왕이 백성들을 위해 창제한 독창적이고 과학적인 글자는?", o: ["한글", "한자", "가나", "알파벳"], a: 0 },
                { q: "대한민국의 수도이자 정치, 경제, 문화의 중심지인 대도시의 이름은?", o: ["인천", "부산", "서울", "제주"], a: 2 },
                { q: "남산 정상에 위치하여 서울 시내 전체의 아름다운 전경을 볼 수 있는 명소는?", o: ["63빌딩", "롯데월드타워", "N서울타워", "광화문"], a: 2 },
                { q: "음력 8월 15일로 가족들이 모여 송편을 빚고 달을 보며 소원을 비는 한국의 명절은?", o: ["설날", "추석", "단오", "동지"], a: 1 }
            ]
        };

        let selectedCountry = "";
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let extractedInfo = {};

        function selectCountry(country, btn) {
            selectedCountry = country;
            document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startQuiz() {
            const name = document.getElementById('studentName').value.trim();
            const idStr = document.getElementById('studentId').value.trim();

            if (!name || !idStr) { alert("모든 정보를 입력해주세요!"); return; }
            if (idStr.length < 5 || idStr.length > 6) { alert("학번은 5자리 혹은 6자리여야 합니다!"); return; }
            if (!selectedCountry) { alert("국가를 선택해주세요!"); return; }

            let grade = idStr.length === 5 ? idStr.substring(0, 1) : idStr.substring(0, 2);
            let classNum = idStr.length === 5 ? idStr.substring(1, 3) : idStr.substring(2, 4);

            extractedInfo = { 
                id: idStr, 
                name: name, 
                displayClass: `${parseInt(grade)}학년 ${parseInt(classNum)}반` 
            };
            
            // Lấy đúng bộ câu hỏi theo ngôn ngữ đã chọn và Trộn ngẫu nhiên (Random)
            let rawQuestions = quizDatabase[selectedCountry] || quizDatabase['대한민국'];
            currentQuestions = [...rawQuestions].sort(() => Math.random() - 0.5);
            
            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) { submitData(); return; }
            document.getElementById('quiz-progress').innerText = `${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            const currentQ = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            currentQ.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => { if(idx === currentQ.a) score += 20; currentQuestionIndex++; loadQuestion(); };
                container.appendChild(btn);
            });
        }

        function submitData() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-text').innerText = score + " / 100";

            const payload = { 
                id: extractedInfo.id, 
                name: extractedInfo.name, 
                class: extractedInfo.displayClass, 
                score: score, 
                time: Date.now() 
            };
            
            fetch('https://kvdb.io/W4Mh7N9bJqS8Vd2C5xYmZa/scores?t=' + Date.now())
            .then(res => res.json())
            .catch(() => { return {}; })
            .then(oldData => {
                let records = oldData && typeof oldData === 'object' ? oldData : {};
                records[extractedInfo.id] = payload;
                
                fetch('https://kvdb.io/W4Mh7N9bJqS8Vd2C5xYmZa/scores', {
                    method: 'POST',
                    body: JSON.stringify(records)
                });
            });
        }
    </script>
</body>
</html>
