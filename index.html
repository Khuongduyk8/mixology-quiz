                { q: "中国功夫最知名的祖庭寺庙是哪一座？", o: ["白马寺", "少林寺", "大慈恩寺", "悬空寺"], a: 1 },
                { q: "中国北方过年时必吃、外形像元宝的面食是什么？", o: ["面条", "饺子", "馒头", "年糕"], a: 1 },
                { q: "象征高洁、常在冬季盛开的中国传统名花是什么？", o: ["牡丹", "梅花", "菊花", "兰花"], a: 1 }
            ],
            '대한민국': [
                { q: "한국의 대표적인 전통 발효 식품으로 매콤한 맛이 특징인 것은?", o: ["치즈", "김치", "단무지", "피클"], a: 1 },
                { q: "조선시대 세종대왕이 백성들을 위해 창제한 독창적인 글자는?", o: ["한글", "한자", "가나", "알파벳"], a: 0 },
                { q: "대한민국의 수도이자 중심지인 대도시의 이름은?", o: ["인천", "부산", "서울", "제주"], a: 2 },
                { q: "남산 정상에 위치하여 서울 전체의 전경을 볼 수 있는 명소는?", o: ["63빌딩", "롯데타워", "N서울타워", "광화문"], a: 2 },
                { q: "음력 8월 15일로 송편을 빚고 달을 보며 소원을 비는 명절은?", o: ["설날", "추석", "단오", "동지"], a: 1 },
                { q: "한국의 전통 의복으로 선이 아름다운 옷은?", o: ["기모노", "치파오", "한복", "아오자이"], a: 2 },
                { q: "우리나라에서 가장 큰 섬이자 화산섬인 곳은?", o: ["독도", "울릉도", "제주도", "강화도"], a: 2 },
                { q: "한국의 화폐 단위는 무엇인가요?", o: ["원", "엔", "달러", "위안"], a: 0 },
                { q: "조선시대 왕들이 살았던 서울의 대표적인 궁궐은?", o: ["경복궁", "덕수궁", "창덕궁", "창경궁"], a: 0 },
                { q: "한국인들이 생일에 주로 끓여 먹는 국은?", o: ["김치찌개", "미역국", "된장국", "떡국"], a: 1 },
                { q: "우리나라의 국화(나라의 꽃)는 무엇인가요?", o: ["장미", "국화", "무궁화", "벚꽃"], a: 2 },
                { q: "한국의 새해 첫날(음력 1월 1일)에 먹는 대표 음식은?", o: ["떡국", "송편", "잡채", "전"], a: 0 },
                { q: "태극기에 사용된 네 개의 괘가 아닌 것은?", o: ["건", "곤", "감", "손"], a: 3 },
                { q: "대한민국 공식 국가(노래)의 제목은?", o: ["아리랑", "애국가", "독도는 우리땅", "고향의 봄"], a: 1 },
                { q: "밥에 여러 가지 나물과 고기, 고추장을 넣어 비벼 먹는 음식은?", o: ["불고기", "비빔밥", "김밥", "떡볶이"], a: 1 },
                { q: "제2의 도시이자 최대의 항구 도시는 어디인가요?", o: ["인천", "대구", "부산", "광주"], a: 2 },
                { q: "한국의 대표적인 민요로 유네스코 인류무형유산인 것은?", o: ["아리랑", "판소리", "잡가", "타령"], a: 0 },
                { q: "세계적인 인기를 끌고 있는 한국의 대중음악 장르는?", o: ["J-POP", "K-POP", "C-POP", "POP"], a: 1 },
                { q: "전통 무술로 올림픽 정식 종목인 것은?", o: ["유도", "태권도", "검도", "우슈"], a: 1 },
                { q: "한국의 대표적인 전통 현악기로 12줄로 된 것은?", o: ["거문고", "가야금", "해금", "아쟁"], a: 1 },
                { q: "독도가 행정구역상 속해 있는 도는 어디인가요?", o: ["강원도", "경상북도", "울릉도", "제주도"], a: 1 },
                { q: "단군왕검이 고조선을 세운 것을 기념하는 국경일은?", o: ["개천절", "광복절", "삼일절", "제헌절"], a: 0 },
                { q: "한국에서 가장 높은 산(남한 기준)은 어디인가요?", o: ["설악산", "지리산", "한라산", "백두산"], a: 2 },
                { q: "전통 가옥의 바닥을 따뜻하게 데우는 한국 고유의 난방 방식은?", o: ["온돌", "벽난로", "라디에이터", "코타츠"], a: 0 },
                { q: "조선왕조를 세운 태조의 이름은 무엇인가요?", o: ["이방원", "이성계", "이도", "이산"], a: 1 }
            ]
        };

        let selectedCountry = "";
        let currentQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let extractedInfo = {};

        function selectCountry(country, btn) {
            selectedCountry = country;
            document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function startQuiz() {
            const name = document.getElementById('studentName').value.trim();
            const idStr = document.getElementById('studentId').value.trim();

            if (!name || !idStr) { alert("모든 정보를 입력해주세요!"); return; }
            if (idStr.length < 5 || idStr.length > 6) { alert("학번은 5자리 혹은 6자리여야 합니다!"); return; }
            if (!selectedCountry) { alert("국가를 선택해주세요!"); return; }

            let grade = idStr.length === 5 ? idStr.substring(0, 1) : idStr.substring(0, 2);
            let classNum = idStr.length === 5 ? idStr.substring(1, 3) : idStr.substring(2, 4);

            extractedInfo = { 
                id: idStr, 
                name: name, 
                displayClass: `${parseInt(grade)}학년 ${parseInt(classNum)}반` 
            };
            
            let rawQuestions = quizDatabase[selectedCountry] || quizDatabase['대한민국'];
            
            // Xáo trộn ngẫu nhiên (Random) toàn bộ 25 câu hỏi, sau đó chỉ bốc lấy đúng 5 câu làm đề thi
            let randomizedPool = [...rawQuestions].sort(() => Math.random() - 0.5);
            currentQuestions = randomizedPool.slice(0, 5);
            
            currentQuestionIndex = 0;
            score = 0;

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= currentQuestions.length) { submitData(); return; }
            document.getElementById('quiz-progress').innerText = `${currentQuestionIndex + 1} / ${currentQuestions.length}`;
            const currentQ = currentQuestions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            currentQ.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${idx + 1}. ${opt}`;
                btn.onclick = () => { if(idx === currentQ.a) score += 20; currentQuestionIndex++; loadQuestion(); };
                container.appendChild(btn);
            });
        }

        function submitData() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-text').innerText = score + " / 100";

            const payload = { 
                id: extractedInfo.id, 
                name: extractedInfo.name, 
                class: extractedInfo.displayClass, 
                score: score, 
                time: Date.now() 
            };
            
            // Đẩy trực tiếp lên Cổng máy chủ Firebase biệt lập
            fetch(`https://mixology-quiz-default-rtdb.firebaseio.com/scores/${extractedInfo.id}.json`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });
        }
    </script>
